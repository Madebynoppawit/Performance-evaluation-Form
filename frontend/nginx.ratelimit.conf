# Rate limit zones — included in the http{} context via conf.d/*.
# Defined here (not in nginx.conf) to keep the server block separate.
#
# zone=api:   30 req/s per IP for general API calls   (burst 60, no delay)
# zone=auth:  10 req/s per IP for auth endpoints       (burst 20, no delay)
# zone=static: unlimited — static assets are not rate-limited

limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_req_status 429;
