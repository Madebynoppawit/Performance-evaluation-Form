server {
  listen 80;
  server_name _;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  # ── Compression ──────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript
             application/xml image/svg+xml font/woff2;

  # ── Security headers ─────────────────────────────────────────────────────────
  # CSP: same-origin only; inline scripts need the nonce approach but since Vite
  # hashes assets we allow 'self'. Tighten further once a nonce strategy is wired.
  add_header Content-Security-Policy
    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';"
    always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  # HSTS — only safe once TLS is terminated in front of this container.
  # Uncomment when a reverse-proxy / load-balancer handles HTTPS:
  # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  # Hide server version from error pages
  add_header X-Powered-By "" always;

  # ── API → backend ─────────────────────────────────────────────────────────────
  # Auth endpoints: strict rate limit (10 req/min per IP, burst 20)
  location /api/auth/ {
    limit_req zone=auth burst=20 nodelay;
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
  }

  # All other API calls: 30 req/s per IP, burst 60
  location /api/ {
    limit_req zone=api burst=60 nodelay;
    proxy_pass http://backend:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;

    # Don't pass server header from upstream to browser
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
  }

  # ── Hashed build assets — immutable, cache 1 year ────────────────────────────
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ── Fonts — cache 1 year ─────────────────────────────────────────────────────
  location /fonts/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ── SPA history fallback ──────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store";
  }
}
