# Monitoring stack: Prometheus + Grafana.
#
# Runs alongside docker-compose.prod.yml:
#
#   docker compose -f docker-compose.prod.yml \
#                  -f docker-compose.monitor.yml \
#                  --env-file .env.prod up -d
#
# Grafana opens at http://localhost:3000 (admin / admin on first login).
# Prometheus opens at http://localhost:9090.
#
# The backend exposes metrics at http://backend:3001/metrics.
# Set METRICS_TOKEN in .env.prod to require Bearer auth on /metrics.

services:
  prometheus:
    image: prom/prometheus:v2.53.4
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  grafana:
    image: grafana/grafana:11.5.6
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3000}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

volumes:
  prometheus_data:
  grafana_data:
