name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci:
    name: Lint / Test / Build / Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate -w backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint (backend + frontend)
        run: npm run lint

      - name: Test (backend + frontend)
        run: npm test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Frontend E2E smoke
        run: npm run test:e2e -w frontend

      - name: Build (backend + frontend)
        run: npm run build

  integration:
    name: Integration (Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/amw_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate -w backend

      - name: Apply migrations
        run: npm run db:deploy -w backend

      - name: Seed test database
        run: npm run db:seed -w backend

      - name: Integration tests
        run: npm run test:integration -w backend

  # Build, vulnerability-scan and publish the production images to GHCR.
  # Runs only on push to main, after CI + integration pass. The deploy step
  # is intentionally left to the target platform (pull these tags).
  images:
    name: Build / scan / push images
    runs-on: ubuntu-latest
    needs: [ci, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        app: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/amw-${{ matrix.app }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.app }}/Dockerfile
          load: true
          tags: amw-${{ matrix.app }}:scan
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: amw-${{ matrix.app }}:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
