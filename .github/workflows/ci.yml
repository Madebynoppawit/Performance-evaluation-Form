name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Fast checks: lint + unit tests — run in parallel ──────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate -w backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
      - run: npm run lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate -w backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
      - run: npm test
      - run: npm audit --audit-level=high

  # ── E2E smoke (needs a build — runs after test/lint confirm code is valid) ────
  e2e:
    name: E2E smoke
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate -w backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -w frontend

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate -w backend
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
      - run: npm run build

  # ── Integration tests against a real Postgres ─────────────────────────────────
  integration:
    name: Integration (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/amw_test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate -w backend
      - run: npm run db:deploy -w backend
      - run: npm run db:seed -w backend
      - run: npm run test:integration -w backend

  # ── Build, vuln-scan and push images to GHCR (main only) ─────────────────────
  images:
    name: Build / scan / push images
    runs-on: ubuntu-latest
    needs: [e2e, build, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [backend, frontend]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/amw-${{ matrix.app }}
          tags: |
            type=sha,format=short
            type=raw,value=latest
      - name: Build (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.app }}/Dockerfile
          load: true
          tags: amw-${{ matrix.app }}:scan
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: amw-${{ matrix.app }}:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - name: Push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
